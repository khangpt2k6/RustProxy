syntax = "proto3";

package rustproxy.admin;

// control plane for managing backends at runtime without a restart
service Admin {
  rpc ListBackends(ListBackendsRequest) returns (ListBackendsResponse);
  rpc AddBackend(AddBackendRequest) returns (AddBackendResponse);
  rpc RemoveBackend(RemoveBackendRequest) returns (RemoveBackendResponse);
  // shift traffic by changing a backend's weight at runtime (canary / drain)
  rpc SetWeight(SetWeightRequest) returns (SetWeightResponse);
}

message ListBackendsRequest {}

message BackendInfo {
  string addr = 1;
  bool healthy = 2;
  uint64 active_connections = 3;
  uint32 weight = 4;
}

message ListBackendsResponse {
  repeated BackendInfo backends = 1;
}

message AddBackendRequest {
  string addr = 1;
  // relative traffic share; 0 is treated as 1 for backward compatibility
  uint32 weight = 2;
}

message AddBackendResponse {
  bool added = 1;
}

message RemoveBackendRequest {
  string addr = 1;
}

message RemoveBackendResponse {
  bool removed = 1;
}

message SetWeightRequest {
  string addr = 1;
  uint32 weight = 2;
}

message SetWeightResponse {
  bool updated = 1;
}
